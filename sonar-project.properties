sonar.projectKey=datp
sonar.projectName=DATP
sonar.projectVersion=0.1.0

sonar.sources=src/datp
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.python.version=3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=outputs/**,data/**,.venv/**,venv/**,dist/**,build/**,**/__pycache__/**,*.egg-info/**,**/*.egg-info/**,mlruns/**,artifacts/**,results/**,paper/**,Journal/**,IEEE/**,Synthesis/**,logs/**,**/.ipynb_checkpoints/**

sonar.test.exclusions=**/__pycache__/**

sonar.coverage.exclusions=tests/**,scripts/**,**/conftest.py
